packages:
  all:
    target: [neoverse_v2]
  # Set nvpl as default blas, lapack and scalapack provider.
  # Can be overwritten in environments if needed.
  blas:
    require: 'nvpl-blas'
  lapack:
    require: 'nvpl-lapack'
  scalapack:
    require: 'netlib-scalapack'
  mpi:
    ### Workaround until CE provides full MPI substitution.
    require: 'cray-mpich'
  blaspp:
    variants:
      - '~cuda'
      - '~openmp'
      - '~rocm'
  nvpl-blas:
    require:
      - 'threads=openmp'
  nvpl-lapack:
    require:
      - 'threads=openmp'
  openblas:
    variants:
      - 'threads=openmp'
  libfabric:
    # Fix version to be compatible with version on todi
    require:
      - '@1.15.2'
  hwloc:
    variants:
      - '~libxml2'
  git:
    # Force git as non-buildable to allow deprecated versions in environments
    # https://github.com/spack/spack/pull/30040
    buildable: false

  ### Workaround until CE provides full MPI substitution.
  # Build using package from alps-cluster-config
  cray-mpich:
    buildable: true
  patchelf:
    require: "@:0.17"
  xpmem:
    buildable: false
    externals:
    - spec: xpmem@2.9.6
      prefix: /usr
